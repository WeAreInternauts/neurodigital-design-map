<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neurodigital Design Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Warm sand → cool lilac base, lifted from the reference */
      --bg-a: #efe6dc;
      --bg-b: #d4d0e2;
      --panel: rgba(255,255,255,0.18);
      --panel-strong: rgba(255,255,255,0.28);
      --stroke: rgba(255,255,255,0.5);
      --stroke-soft: rgba(255,255,255,0.22);
      --text: #161616;
      --muted: rgba(22,22,22,0.68);
      --shadow: 0 28px 60px rgba(84, 70, 58, 0.22), 0 8px 20px rgba(84, 70, 58, 0.14);
      /* Saturated accents matching the Liquid Glass Kit reference */
      --violet: #7c5cff;
      --violet-soft: rgba(124, 92, 255, 0.78);
      --mint: #4ee0bd;
      --mint-soft: rgba(78, 224, 189, 0.78);
      --peach: #ffb59a;
      --peach-soft: rgba(255, 181, 154, 0.7);
      --pink: #ffb3d1;
      --radius-xl: 38px;
      --radius-lg: 28px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      color: var(--text);
      background: transparent;
      /* Use dynamic viewport units so mobile browser chrome doesn't crop */
      min-height: 100dvh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(8px, 2vw, 24px);
      overflow: hidden;
    }

    .frame {
      position: relative;
      width: 100%;
      max-width: 1120px;
      /* Fill the available viewport height, leaving room for body padding */
      height: calc(100dvh - clamp(16px, 4vw, 48px));
      max-height: 820px;
      background: transparent;
      overflow: hidden;
      isolation: isolate;
    }

    .canvas {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .node {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(10px, 1.6cqh, 22px) clamp(12px, 2cqw, 26px);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.1));
      border: 1px solid var(--stroke-soft);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.45),
        inset 0 -14px 22px rgba(255,255,255,0.04),
        0 18px 44px rgba(94, 76, 64, 0.07),
        0 6px 14px rgba(96, 84, 71, 0.05);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      overflow: hidden;
      transform: translateZ(0);
      mix-blend-mode: normal;
    }

    .node::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.55), transparent 28%),
        radial-gradient(circle at 85% 82%, rgba(255,255,255,0.12), transparent 30%);
      pointer-events: none;
    }

    .node::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,255,255,0.18), rgba(92,255,240,0.5), rgba(194,154,255,0.42));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      opacity: 0.55;
      pointer-events: none;
      z-index: 3;
      filter: blur(1.4px);
    }

    .node .inner {
      position: relative;
      z-index: 2;
    }

    .node h2,
    .node h3 {
      margin: 0;
      font-size: clamp(0.78rem, 0.55rem + 1.05vw, 1.5rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .node p {
      margin: clamp(4px, 0.8cqh, 8px) 0 0;
      font-size: clamp(0.72rem, 0.55rem + 0.45vw, 0.95rem);
      color: var(--muted);
      line-height: 1.3;
    }

    /* ---- Layout: every dimension is % of the canvas, so the whole
       composition scales with the viewport. Heights use cqh (canvas
       height units) so nodes stay proportional vertically too.        */
    .canvas { container-type: size; }

    /* Hero & bottom capsule share identical geometry so the headline
       “Neurodigital Design” and “Design with manners” feel like a matched pair. */
    .hero,
    .bottom {
      width: 64%;
      height: 17cqh;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08));
    }
    /* Stack order: hero (back) → mid row → low row → bottom capsule (front).
       Each layer overlaps the one beneath it for a tactile, layered feel. */
    .hero   { left: 18%; top: 6%;    z-index: 3;  }
    .bottom { left: 18%; bottom: 6%; z-index: 12; }

    .hero h2,
    .bottom h3 { font-size: clamp(1.3rem, 0.85rem + 1.7vw, 2.5rem); letter-spacing: -0.05em; }

    /* The 5 middle nodes are perfect circles. */
    .left-mid,
    .center-mid,
    .right-mid,
    .left-low,
    .right-low {
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      height: auto;
    }

    /* mid row — 3 SMALLER circles, evenly spaced under the hero.
       Centers (as % of canvas width): 25%, 50%, 75%. Width = 22%. */
    .left-mid   { left: 14%; top: 18%; width: 22%; z-index: 5; }
    .center-mid { left: 39%; top: 18%; width: 22%; z-index: 5; }
    .right-mid  { left: 64%; top: 18%; width: 22%; z-index: 5; }

    /* low row — 2 circles aligned with the GAPS between the top 3.
       Gap centers sit at 37.5% and 62.5% of the canvas. Width matches mid
       row (22%) for a consistent rhythm; left = center - 11%. */
    /* Low row pulled up so it overlaps the mid row, sitting in front of it. */
    .left-low  { left: 26.5%; top: 41%; width: 22%; z-index: 9; }
    .right-low { left: 51.5%; top: 41%; width: 22%; z-index: 9; }

    /* Tints live ONLY on the rim. Bodies stay clear glass.
       Conic gradients sweep green and purple around the full ring. */
    .glow-teal::after {
      background: conic-gradient(from 200deg at 50% 50%,
        #4ee0bd 0deg,
        #7c5cff 90deg,
        #4ee0bd 180deg,
        #7c5cff 270deg,
        #4ee0bd 360deg);
    }
    .glow-purple::after {
      background: conic-gradient(from 20deg at 50% 50%,
        #7c5cff 0deg,
        #4ee0bd 90deg,
        #7c5cff 180deg,
        #4ee0bd 270deg,
        #7c5cff 360deg);
    }
    .glow-mix::after {
      background: conic-gradient(from 110deg at 50% 50%,
        #7c5cff 0deg,
        #4ee0bd 120deg,
        #7c5cff 240deg,
        #4ee0bd 360deg);
    }

    .glow {
      position: absolute;
      border-radius: inherit;
      filter: blur(18px);
      opacity: 0.7;
      z-index: -1;
      pointer-events: none;
      transform: translateY(16px) translateX(8px);
    }

    .hero .glow      { inset: auto 4% -14px 28%; height: 32px; background: linear-gradient(90deg, rgba(124, 92, 255, 0.55), rgba(78, 224, 189, 0.45)); }
    .left-mid .glow  { inset: auto 5% -16px 18%; height: 26px; background: linear-gradient(90deg, rgba(124, 92, 255, 0.6), rgba(124, 92, 255, 0.15)); }
    .center-mid .glow{ inset: auto 18% -14px 18%; height: 22px; background: linear-gradient(90deg, rgba(78, 224, 189, 0.55), rgba(124, 92, 255, 0.35)); }
    .right-mid .glow { inset: auto 18% -16px 18%; height: 26px; background: linear-gradient(90deg, rgba(78, 224, 189, 0.6), rgba(78, 224, 189, 0.15)); }
    .left-low .glow  { inset: auto 15% -20px 22%; height: 28px; background: linear-gradient(90deg, rgba(124, 92, 255, 0.45), rgba(78, 224, 189, 0.35)); }
    .right-low .glow { inset: auto 18% -20px 16%; height: 28px; background: linear-gradient(90deg, rgba(78, 224, 189, 0.55), rgba(124, 92, 255, 0.35)); }
    .bottom .glow    { inset: auto 20% -20px 20%; height: 30px; background: linear-gradient(90deg, rgba(124, 92, 255, 0.5), rgba(78, 224, 189, 0.45)); }

    /* Threads removed — SVG hidden entirely. */
    svg.connectors { display: none; }

    /* Narrow viewports — stack vertically. Circles are capped so they
       never grow into giant squares on phones. Hero & bottom remain pills. */
    @media (max-width: 620px) {
      body { padding: 12px; }
      .frame {
        height: auto;
        max-height: none;
        min-height: 100dvh;
      }
      .canvas {
        container-type: normal;
        height: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
      }
      .node,
      .hero,
      .left-mid,
      .center-mid,
      .right-mid,
      .left-low,
      .right-low,
      .bottom {
        position: relative;
        left: auto; right: auto; top: auto; bottom: auto;
        z-index: auto;
      }
      /* Pills: full width */
      .hero,
      .bottom {
        width: 100%;
        height: auto;
        min-height: 96px;
        aspect-ratio: auto;
      }
      /* Circles: capped at 200px so they stay balanced on phones */
      .left-mid,
      .center-mid,
      .right-mid,
      .left-low,
      .right-low {
        width: min(56vw, 200px);
        height: auto;
        aspect-ratio: 1 / 1;
        border-radius: 50%;
      }
      /* Slight overlap retained on mobile for visual continuity */
      .canvas > .node + .node { margin-top: -14px; }
    }
  </style>
</head>
<body>
  <main class="frame">
    <section class="canvas" id="canvas" aria-label="Neurodigital design conceptual map">
      <svg class="connectors" id="connectors" aria-hidden="true">
        <defs>
          <linearGradient id="gradLine" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.55)" />
            <stop offset="40%" stop-color="#7c5cff" />
            <stop offset="70%" stop-color="#4ee0bd" />
            <stop offset="100%" stop-color="rgba(255,255,255,0.55)" />
          </linearGradient>
        </defs>
        <!-- Paths are drawn dynamically by JS so anchors track real node edges -->
      </svg>

      <article class="node hero glow-mix" data-id="hero">
        <span class="glow"></span>
        <div class="inner">
          <h2>Neurodigital Design</h2>
          <p>Behavior, cognition, and brand experience fused into one interface philosophy.</p>
        </div>
      </article>

      <article class="node left-mid glow-purple" data-id="left-mid">
        <span class="glow"></span>
        <div class="inner">
          <h3>Consumer<br>Psychology</h3>
        </div>
      </article>

      <article class="node center-mid glow-mix" data-id="center-mid">
        <span class="glow"></span>
        <div class="inner">
          <h3>Neuroscience</h3>
        </div>
      </article>

      <article class="node right-mid glow-teal" data-id="right-mid">
        <span class="glow"></span>
        <div class="inner">
          <h3>Branding<br>Systems</h3>
        </div>
      </article>

      <article class="node left-low glow-mix" data-id="left-low">
        <span class="glow"></span>
        <div class="inner">
          <h3>Concierge-like<br>navigation</h3>
        </div>
      </article>

      <article class="node right-low glow-teal" data-id="right-low">
        <span class="glow"></span>
        <div class="inner">
          <h3>Cognitive<br>Engagement Styles</h3>
        </div>
      </article>

      <article class="node bottom glow-mix" data-id="bottom">
        <span class="glow"></span>
        <div class="inner">
          <h3>Design with manners</h3>
          <p>Design for real people, not just clicks.</p>
        </div>
      </article>
    </section>
  </main>

  <script>
    // ---- Auto-anchor SVG threads to real node edges ----
    // Each connection: from node-id + side, to node-id + side.
    // Sides: 'top', 'bottom', 'left', 'right'. Curves are auto-shaped.
    const CONNECTIONS = [
      { from: 'hero',       fromSide: 'bottom-left',  to: 'left-mid',    toSide: 'top' },
      { from: 'hero',       fromSide: 'bottom',       to: 'center-mid',  toSide: 'top' },
      { from: 'hero',       fromSide: 'bottom-right', to: 'right-mid',   toSide: 'top' },
      { from: 'left-mid',   fromSide: 'bottom',       to: 'left-low',    toSide: 'top' },
      { from: 'center-mid', fromSide: 'bottom',       to: 'left-low',    toSide: 'top-right' },
      { from: 'center-mid', fromSide: 'bottom',       to: 'right-low',   toSide: 'top-left'  },
      { from: 'right-mid',  fromSide: 'bottom',       to: 'right-low',   toSide: 'top' },
      { from: 'left-low',   fromSide: 'bottom',       to: 'bottom',      toSide: 'top-left' },
      { from: 'right-low',  fromSide: 'bottom',       to: 'bottom',      toSide: 'top-right' },
    ];

    const canvas = document.getElementById('canvas');
    const svg = document.getElementById('connectors');

    function getAnchor(rect, canvasRect, side) {
      // Inset values (in px) shrink the anchor box slightly so threads
      // appear to enter the node's body, not its outermost edge.
      const insetX = Math.min(28, rect.width * 0.18);
      const insetY = Math.min(20, rect.height * 0.22);
      const x0 = rect.left - canvasRect.left;
      const y0 = rect.top  - canvasRect.top;
      const w = rect.width;
      const h = rect.height;
      const cx = x0 + w / 2;
      const cy = y0 + h / 2;

      switch (side) {
        case 'top':          return [cx, y0 + insetY * 0.4];
        case 'bottom':       return [cx, y0 + h - insetY * 0.4];
        case 'left':         return [x0 + insetX * 0.4, cy];
        case 'right':        return [x0 + w - insetX * 0.4, cy];
        case 'top-left':     return [x0 + w * 0.28, y0 + insetY * 0.5];
        case 'top-right':    return [x0 + w * 0.72, y0 + insetY * 0.5];
        case 'bottom-left':  return [x0 + w * 0.28, y0 + h - insetY * 0.5];
        case 'bottom-right': return [x0 + w * 0.72, y0 + h - insetY * 0.5];
        default:             return [cx, cy];
      }
    }

    function buildPath(p1, p2) {
      const [x1, y1] = p1;
      const [x2, y2] = p2;
      const dx = x2 - x1;
      const dy = y2 - y1;
      // Vertical-dominant curve: control points pulled along the y-axis
      // so threads arc gracefully and meet anchors perpendicularly.
      const cp1x = x1 + dx * 0.18;
      const cp1y = y1 + dy * 0.55;
      const cp2x = x2 - dx * 0.18;
      const cp2y = y2 - dy * 0.45;
      return `M ${x1.toFixed(1)} ${y1.toFixed(1)} C ${cp1x.toFixed(1)} ${cp1y.toFixed(1)}, ${cp2x.toFixed(1)} ${cp2y.toFixed(1)}, ${x2.toFixed(1)} ${y2.toFixed(1)}`;
    }

    function draw() {
      const cRect = canvas.getBoundingClientRect();
      svg.setAttribute('viewBox', `0 0 ${cRect.width} ${cRect.height}`);

      // Clear previous paths but keep <defs>
      Array.from(svg.querySelectorAll('path')).forEach(p => p.remove());

      const nodeRects = {};
      document.querySelectorAll('.node').forEach(el => {
        nodeRects[el.dataset.id] = el.getBoundingClientRect();
      });

      // Three passes for layered look: base (wide soft), glow (gradient), top (crisp)
      const layers = [
        { cls: 'connector-base' },
        { cls: 'connector-glow' },
        { cls: 'connector-top' },
      ];

      const paths = CONNECTIONS.map(c => {
        const r1 = nodeRects[c.from];
        const r2 = nodeRects[c.to];
        if (!r1 || !r2) return null;
        const p1 = getAnchor(r1, cRect, c.fromSide);
        const p2 = getAnchor(r2, cRect, c.toSide);
        return buildPath(p1, p2);
      }).filter(Boolean);

      const ns = 'http://www.w3.org/2000/svg';
      layers.forEach(layer => {
        paths.forEach(d => {
          const path = document.createElementNS(ns, 'path');
          path.setAttribute('class', layer.cls);
          path.setAttribute('d', d);
          svg.appendChild(path);
        });
      });
    }

    // Run on load + observe size changes for responsiveness
    function init() {
      if (window.matchMedia('(max-width: 620px)').matches) return;
      draw();
    }

    // Use a ResizeObserver on the canvas itself so threads redraw on any
    // size change — viewport resize, container resize, font swaps, etc.
    if (typeof ResizeObserver !== 'undefined') {
      const ro = new ResizeObserver(() => {
        Array.from(svg.querySelectorAll('path')).forEach(p => p.remove());
        init();
      });
      ro.observe(canvas);
    }

    window.addEventListener('load', init);
    window.addEventListener('resize', () => {
      // Clear and redraw (or hide on mobile)
      Array.from(svg.querySelectorAll('path')).forEach(p => p.remove());
      init();
    });

    // Re-anchor when fonts finish loading (text reflow can shift node sizes)
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => init());
    }
  </script>
</body>
</html>
